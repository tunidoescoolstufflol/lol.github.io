*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f;
  --panel: #1c1c1c;
  --border: #2e2e2e;
  --paper: #faf6ee;
  --red: #e63030;
  --yellow: #f5c842;
  --text-ui: #c8c0b0;
  --input-bg: #242424;
}
body {
  background: var(--bg);
  font-family: 'MangaTemple', monospace;
  color: var(--text-ui);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 40px;
  background-image:
    radial-gradient(circle at 15% 15%, rgba(230,48,48,0.06) 0%, transparent 50%),
    radial-gradient(circle at 85% 85%, rgba(245,200,66,0.04) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 29px, rgba(255,255,255,0.015) 30px),
    repeating-linear-gradient(90deg, transparent, transparent 29px, rgba(255,255,255,0.015) 30px);
}
header { text-align:center; margin-bottom:28px; animation: fadeDown 0.6s ease both; }
header h1 {
  font-family: 'JujutsuKaisen', sans-serif;
  font-size: clamp(1.8rem,5vw,2.8rem);
  color: var(--paper);
  text-shadow: 4px 4px 0 var(--red), 7px 7px 0 rgba(0,0,0,0.6);
}
header p { font-size:0.6rem; letter-spacing:0.18em; color:var(--red); margin-top:5px; text-transform:uppercase; }

.workspace {
  display: grid;
  grid-template-columns: 310px 1fr;
  gap: 20px;
  width: 100%;
  max-width: 960px;
  animation: fadeUp 0.5s 0.15s ease both;
}
@media (max-width:680px) { .workspace { grid-template-columns:1fr; } }

.panel { background:var(--panel); border:1px solid var(--border); border-radius:4px; padding:18px; }
.panel-title { font-size:0.55rem; letter-spacing:0.22em; color:var(--red); text-transform:uppercase; margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }

.field { margin-bottom:12px; }
label { display:block; font-size:0.55rem; letter-spacing:0.14em; color:var(--text-ui); opacity:0.65; margin-bottom:5px; text-transform:uppercase; }

textarea, select {
  width:100%; background:var(--input-bg); border:1px solid var(--border);
  color:var(--paper); border-radius:3px; font-family:'MangaTemple',monospace;
  font-size:0.68rem; padding:7px 9px; outline:none; transition:border-color 0.2s;
}
textarea:focus, select:focus { border-color:var(--red); }
textarea { resize:vertical; min-height:60px; line-height:1.5; }
select option { background:#1c1c1c; }

/* Sliders */
.slider-row { display:flex; align-items:center; gap:10px; }
input[type=range] {
  flex:1; height:4px; appearance:none; cursor:pointer;
  background:linear-gradient(to right, var(--red) 0%, var(--red) var(--pct,50%), var(--border) var(--pct,50%));
  border:none; border-radius:2px; outline:none;
}
input[type=range]::-webkit-slider-thumb {
  appearance:none; width:13px; height:13px; background:var(--paper);
  border-radius:50%; border:2px solid var(--red); cursor:pointer;
}
.slider-val { font-size:0.62rem; color:var(--yellow); min-width:38px; text-align:right; }

/* Shape grid */
.shape-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
.shape-btn {
  background:var(--input-bg); border:1px solid var(--border); border-radius:3px;
  padding:7px 3px 5px; cursor:pointer; display:flex; flex-direction:column;
  align-items:center; gap:3px; color:var(--text-ui); font-family:'MangaTemple',monospace;
  font-size:0.5rem; transition:border-color 0.2s, background 0.2s;
}
.shape-btn svg { width:38px; height:28px; }
.shape-btn:hover { border-color:rgba(230,48,48,0.6); }
.shape-btn.active { border-color:var(--yellow); background:rgba(245,200,66,0.07); color:var(--yellow); }

/* Tab system */
.tabs { display:flex; gap:2px; margin-bottom:14px; }
.tab-btn {
  flex:1; background:var(--input-bg); border:1px solid var(--border);
  border-radius:3px 3px 0 0; padding:7px 4px; cursor:pointer;
  color:var(--text-ui); font-family:'MangaTemple',monospace; font-size:0.52rem;
  letter-spacing:0.06em; text-align:center; transition:all 0.2s;
}
.tab-btn.active { background:var(--panel); border-bottom-color:var(--panel); color:var(--yellow); border-top-color:var(--yellow); }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* Tail grid */
.tail-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.tail-btn {
  background:var(--input-bg); border:1px solid var(--border); border-radius:3px;
  padding:6px 3px; cursor:pointer; color:var(--text-ui); font-family:'MangaTemple',monospace;
  font-size:0.5rem; text-align:center; transition:border-color 0.2s, color 0.2s;
}
.tail-btn:hover { border-color:rgba(230,48,48,0.6); }
.tail-btn.active { border-color:var(--yellow); color:var(--yellow); }

/* Double tail */
.dtail-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; }

/* Colors */
.color-row { display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
.color-swatch {
  width:24px; height:24px; border-radius:50%; border:2px solid transparent;
  cursor:pointer; transition:transform 0.15s, border-color 0.15s; flex-shrink:0;
}
.color-swatch:hover { transform:scale(1.15); }
.color-swatch.active { border-color:var(--paper); }
input[type=color] {
  width:28px; height:24px; padding:1px 2px; cursor:pointer;
  border-radius:50%; border:1px solid var(--border); background:var(--input-bg);
}

.dl-btn {
  width:100%; margin-top:16px; background:var(--red); border:none; color:var(--paper);
  font-family:'JujutsuKaisen',sans-serif; font-size:0.95rem; letter-spacing:0.1em;
  padding:11px; border-radius:3px; cursor:pointer; transition:background 0.2s, transform 0.1s;
  text-shadow:2px 2px 0 rgba(0,0,0,0.4); box-shadow:3px 3px 0 rgba(0,0,0,0.5);
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.dl-btn:hover { background:#ff3f3f; transform:translate(-1px,-1px); box-shadow:4px 4px 0 rgba(0,0,0,0.5); }
.dl-btn:active { transform:translate(1px,1px); box-shadow:1px 1px 0 rgba(0,0,0,0.5); }
.dl-btn.loading { opacity:0.6; pointer-events:none; }

.preview-panel { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:360px; }
canvas { max-width:100%; filter:drop-shadow(0 8px 28px rgba(0,0,0,0.7)); }
.preview-hint { font-size:0.5rem; letter-spacing:0.12em; color:rgba(200,192,176,0.3); margin-top:10px; text-transform:uppercase; }

/* Double bubble text area */
.double-texts { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

/* Section divider */
.section-divider { font-size:0.5rem; letter-spacing:0.18em; color:rgba(200,192,176,0.3); text-transform:uppercase; margin:12px 0 8px; padding-top:8px; border-top:1px solid var(--border); }

/* Preset chips */
.preset-grid { display:flex; flex-wrap:wrap; gap:5px; }
.preset-btn {
  background:var(--input-bg); border:1px solid var(--border); border-radius:2px;
  padding:4px 8px; cursor:pointer; color:var(--text-ui);
  font-family:'MangaTemple',monospace; font-size:0.5rem; letter-spacing:0.04em;
  transition:border-color 0.15s, color 0.15s;
}
.preset-btn:hover { border-color:var(--red); color:var(--paper); }

/* Text style buttons */
.style-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.style-btn {
  background:var(--input-bg); border:1px solid var(--border); border-radius:3px;
  padding:7px 4px 5px; cursor:pointer; display:flex; flex-direction:column;
  align-items:center; gap:3px; color:var(--text-ui);
  font-family:'MangaTemple',monospace; font-size:0.5rem; letter-spacing:0.04em;
  transition:border-color 0.2s, background 0.2s;
}
.style-btn svg { width:38px; height:22px; }
.style-btn:hover { border-color:rgba(230,48,48,0.6); }
.style-btn.active { border-color:var(--yellow); background:rgba(245,200,66,0.07); color:var(--yellow); }

@keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:none; } }
@keyframes fadeUp   { from { opacity:0; transform:translateY(14px);  }} to { opacity:1; transform:none; } }

input[type=checkbox] {
  width:16px; height:16px; cursor:pointer; accent-color:var(--red);
  vertical-align:middle; margin-left:4px;
}
</style>
</head>

/* Slider */
function syncSlider(el, key) {
  const min=+el.min, max=+el.max, val=+el.value;
  el.style.setProperty('--pct', ((val-min)/(max-min)*100).toFixed(1)+'%');
  const labels = {
    w:'wVal', h:'hVal', rotation:'rotationVal', fontSize:'fontSizeVal',
    borderWidth:'borderWidthVal', textStroke:'textStrokeVal',
    textRotation:'textRotationVal', letterSpacing:'letterSpacingVal',
    lineHeight:'lineHeightVal', textOffsetX:'textOffsetXVal',
    textOffsetY:'textOffsetYVal', bubblePadding:'bubblePaddingVal',
    bgAlpha:'bgAlphaVal',
  };
  const lid = labels[key] || key+'Val';
  const suffix = (key==='rotation'||key==='textRotation') ? '°' : '';
  const disp = (key==='lineHeight'||key==='bgAlpha'||key==='bubblePadding')
    ? parseFloat(val).toFixed(2) : val;
  document.getElementById(lid).textContent = disp+suffix;
  state[key] = +val;
  draw();
}

function initSlider(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  const min=+el.min, max=+el.max, val=+el.value;
  el.style.setProperty('--pct', ((val-min)/(max-min)*100).toFixed(1)+'%');
}

/* ── Shape drawing helpers ──────────────────────────── */

// Draw an organic manga oval with slight squish/wobble
function mangaOval(c, cx, cy, rx, ry, wobble=0.012) {
  c.beginPath();
  const steps = 120;
  for (let i=0; i<=steps; i++) {
    const t = (i/steps)*Math.PI*2;
    // Add subtle wobble for organic feel
    const w = wobble;
    const nx = cx + Math.cos(t)*rx*(1 + Math.sin(t*3)*w + Math.cos(t*5)*w*0.5);
    const ny = cy + Math.sin(t)*ry*(1 + Math.cos(t*4)*w*0.7);
    i===0 ? c.moveTo(nx,ny) : c.lineTo(nx,ny);
  }
  c.closePath();
}

function mangaRoundRect(c, x, y, w, h, r) {
  c.beginPath(); c.roundRect(x,y,w,h,r); c.closePath();
}

function mangaJagged(c, cx, cy, rx, ry, spikes) {
  c.beginPath();
  for (let i=0; i<spikes*2; i++) {
    const a = (i/(spikes*2))*Math.PI*2 - Math.PI/2;
    const r2 = (i%2===0) ? 1.0 : 0.76;
    c.lineTo(cx+Math.cos(a)*rx*r2, cy+Math.sin(a)*ry*r2);
  }
  c.closePath();
}

function mangaScream(c, cx, cy, rx, ry, spikes) {
  c.beginPath();
  for (let i=0; i<spikes*2; i++) {
    const a = (i/(spikes*2))*Math.PI*2 - Math.PI/2;
    const r2 = (i%2===0) ? 1.0 : 0.44;
    c.lineTo(cx+Math.cos(a)*rx*r2, cy+Math.sin(a)*ry*r2);
  }
  c.closePath();
}

function mangaCaption(c, x, y, w, h) {
  // Box with top stripe (like narration boxes)
  c.beginPath(); c.rect(x,y,w,h); c.closePath();
}

// Angular / hexagonal bubble — like KREAK-style SFX bubbles
function mangaAngular(c, cx, cy, rx, ry) {
  c.beginPath();
  const cut = 0.28; // fraction to cut corners
  const lx = cx - rx, rx2 = cx + rx;
  const ty = cy - ry, by = cy + ry;
  const xCut = rx * cut, yCut = ry * cut;
  c.moveTo(lx + xCut, ty);
  c.lineTo(rx2 - xCut, ty);
  c.lineTo(rx2, ty + yCut);
  c.lineTo(rx2, by - yCut);
  c.lineTo(rx2 - xCut, by);
  c.lineTo(lx + xCut, by);
  c.lineTo(lx, by - yCut);
  c.lineTo(lx, ty + yCut);
  c.closePath();
}

function buildShapePath(c, shape, cx, cy, rx, ry, x, y, w, h) {
  switch(shape) {
    case 'oval':      mangaOval(c,cx,cy,rx,ry,0.014); break;
    case 'oval-wide': mangaOval(c,cx,cy,rx*1.1,ry*0.85,0.01); break;
    case 'oval-tall': mangaOval(c,cx,cy,rx*0.85,ry*1.1,0.01); break;
    case 'roundrect': mangaRoundRect(c,x,y,w,h,Math.min(w,h)*0.28); break;
    case 'jagged':    mangaJagged(c,cx,cy,rx,ry,11); break;
    case 'scream':    mangaScream(c,cx,cy,rx,ry,14); break;
    case 'thought':   mangaOval(c,cx,cy,rx,ry,0.01); break;
    case 'whisper':   mangaOval(c,cx,cy,rx,ry,0.008); break;
    case 'caption':   mangaCaption(c,x,y,w,h); break;
    case 'angular':   mangaAngular(c,cx,cy,rx,ry); break;
  }
}

/* ── Tail helpers ───────────────────────────────────── */
function getTail(W, H, pad, dir) {
  const bw=W-pad*2, bh=H-pad*2, cx=W/2, cy=H/2;
  const reach=Math.min(bw,bh)*0.5;
  const hb=Math.min(bw,bh)*0.08;
  let ax,ay,tx,ty;
  switch(dir) {
    case 'bl': ax=cx-bw*0.2; ay=cy+bh*0.42; tx=ax-reach*0.5; ty=ay+reach*0.7; break;
    case 'bc': ax=cx+bw*0.03; ay=cy+bh*0.5; tx=cx-bw*0.04; ty=ay+reach; break;
    case 'br': ax=cx+bw*0.2; ay=cy+bh*0.42; tx=ax+reach*0.5; ty=ay+reach*0.7; break;
    case 'tl': ax=cx-bw*0.2; ay=cy-bh*0.42; tx=ax-reach*0.5; ty=ay-reach*0.7; break;
    case 'tc': ax=cx+bw*0.03; ay=cy-bh*0.5; tx=cx-bw*0.04; ty=ay-reach; break;
    case 'tr': ax=cx+bw*0.2; ay=cy-bh*0.42; tx=ax+reach*0.5; ty=ay-reach*0.7; break;
    case 'll': ax=cx-bw*0.5; ay=cy-bh*0.05; tx=ax-reach; ty=cy+bh*0.05; break;
    case 'rr': ax=cx+bw*0.5; ay=cy-bh*0.05; tx=ax+reach; ty=cy+bh*0.05; break;
    default: return null;
  }
  const dx=tx-ax, dy=ty-ay, len=Math.sqrt(dx*dx+dy*dy)||1;
  const px=-dy/len*hb, py=dx/len*hb;
  return { tip:[tx,ty], left:[ax-px,ay-py], right:[ax+px,ay+py] };
}

function drawTailFill(c, pts, bgColor) {
  if (!pts) return;
  const [tx,ty]=pts.tip,[lx,ly]=pts.left,[rx2,ry2]=pts.right;
  // Slightly curved concave sides — matches real manga tails
  const mx=(lx+rx2)/2, my=(ly+ry2)/2;
  const pull=0.12;
  const ctrl1x=tx+(lx-tx)*0.5+(my-ty)*pull*0.5;
  const ctrl1y=ty+(ly-ty)*0.5-(mx-tx)*pull*0.5;
  const ctrl2x=tx+(rx2-tx)*0.5+(my-ty)*pull*0.5;
  const ctrl2y=ty+(ry2-ty)*0.5-(mx-tx)*pull*0.5;
  c.beginPath();
  c.moveTo(lx,ly);
  c.quadraticCurveTo(ctrl1x,ctrl1y,tx,ty);
  c.quadraticCurveTo(ctrl2x,ctrl2y,rx2,ry2);
  c.closePath();
}

// bx,by = top-left of bubble; tbw,tbh = bubble width/height
function drawThoughtTailCircles(c, bx, by, tbw, tbh, dir, bgColor, strokeColor, sw) {
  if (dir==='none') return;
  const cx=bx+tbw/2, cy=by+tbh/2;
  const bw=tbw, bh=tbh;
  let sx,sy,ex,ey;
  switch(dir) {
    case 'bl': sx=cx-bw*0.2; sy=cy+bh*0.42; ex=sx-36; ey=sy+46; break;
    case 'bc': sx=cx; sy=cy+bh*0.5; ex=cx-10; ey=sy+50; break;
    case 'br': sx=cx+bw*0.2; sy=cy+bh*0.42; ex=sx+36; ey=sy+46; break;
    case 'tl': sx=cx-bw*0.2; sy=cy-bh*0.42; ex=sx-36; ey=sy-46; break;
    case 'tc': sx=cx; sy=cy-bh*0.5; ex=cx-10; ey=sy-50; break;
    case 'tr': sx=cx+bw*0.2; sy=cy-bh*0.42; ex=sx+36; ey=sy-46; break;
    case 'll': sx=cx-bw*0.5; sy=cy; ex=sx-50; ey=sy+8; break;
    case 'rr': sx=cx+bw*0.5; sy=cy; ex=sx+50; ey=sy+8; break;
    default: return;
  }
  const sizes=[10,7,4.5,2.8], dx=ex-sx, dy=ey-sy;
  for (let i=0;i<sizes.length;i++) {
    const t=(i+1)/(sizes.length+1);
    c.beginPath(); c.ellipse(sx+dx*t,sy+dy*t,sizes[i],sizes[i]*0.82,0,0,Math.PI*2);
    c.fillStyle=bgColor; c.fill();
    if (sw>0) { c.strokeStyle=strokeColor; c.lineWidth=Math.max(1,sw*0.7); c.stroke(); }
  }
}

/* ── Text wrap ──────────────────────────────────────── */
function wrapText(c, text, maxWidth, fontSize, font, lSpacing=0) {
  c.font=`${fontSize}px '${font}'`;
  function mw(txt) {
    if (!lSpacing) return c.measureText(txt).width;
    let w=0; for (const ch of txt) w+=c.measureText(ch).width;
    w += lSpacing * Math.max(0, txt.length-1);
    return w;
  }
  const out=[];
  for (const raw of text.split('\n')) {
    let cur='';
    for (const w of raw.split(' ')) {
      const test=cur?cur+' '+w:w;
      if (mw(test)<=maxWidth) { cur=test; }
      else { if(cur)out.push(cur); cur=w; }
    }
    out.push(cur||'');
  }
  return out.length?out:[''];
}

/* ── Draw a single bubble onto context c ───────────── */
function drawBubble(c, opts) {
  // opts: {x, y, w, h, shape, tail, text, font, fontSize, textColor, bgColor, borderWidth, rotation, wobble}
  const {bx,by,bw,bh,shape,tail,text,font,fontSize,textColor,bgColor,borderWidth,rotation} = opts;
  const cx=bx+bw/2, cy=by+bh/2;
  const rx=bw/2, ry=bh/2;

  // Apply fill opacity
  const bgAlpha = opts.bgAlpha !== undefined ? opts.bgAlpha : 1.0;
  function applyFill(ctx2) {
    if (bgAlpha >= 1) { ctx2.fillStyle=bgColor; return; }
    // Parse hex or rgb and apply alpha
    let r=255,g=255,b=255;
    const hm = bgColor.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
    if (hm) { r=parseInt(hm[1],16); g=parseInt(hm[2],16); b=parseInt(hm[3],16); }
    ctx2.fillStyle=`rgba(${r},${g},${b},${bgAlpha})`;
  }

  // Tail — compute relative to bubble center
  const noTail = tail==='none' || ['jagged','scream'].includes(shape);
  const isThought = shape==='thought';

  // Compute tail anchor points in bubble-local coords
  function getLocalTail(dir) {
    if (dir==='none') return null;
    const reach=Math.min(bw,bh)*0.5;
    const hb=Math.min(bw,bh)*0.08;
    let ax,ay,tx,ty;
    switch(dir) {
      case 'bl': ax=cx-bw*0.2; ay=cy+bh*0.42; tx=ax-reach*0.5; ty=ay+reach*0.7; break;
      case 'bc': ax=cx+bw*0.03; ay=cy+bh*0.5; tx=cx-bw*0.04; ty=ay+reach; break;
      case 'br': ax=cx+bw*0.2; ay=cy+bh*0.42; tx=ax+reach*0.5; ty=ay+reach*0.7; break;
      case 'tl': ax=cx-bw*0.2; ay=cy-bh*0.42; tx=ax-reach*0.5; ty=ay-reach*0.7; break;
      case 'tc': ax=cx+bw*0.03; ay=cy-bh*0.5; tx=cx-bw*0.04; ty=ay-reach; break;
      case 'tr': ax=cx+bw*0.2; ay=cy-bh*0.42; tx=ax+reach*0.5; ty=ay-reach*0.7; break;
      case 'll': ax=cx-bw*0.5; ay=cy-bh*0.05; tx=ax-reach; ty=cy+bh*0.05; break;
      case 'rr': ax=cx+bw*0.5; ay=cy-bh*0.05; tx=ax+reach; ty=cy+bh*0.05; break;
      default: return null;
    }
    const dx2=tx-ax,dy2=ty-ay,len=Math.sqrt(dx2*dx2+dy2*dy2)||1;
    const px=-dy2/len*hb, py=dx2/len*hb;
    return { tip:[tx,ty], left:[ax-px,ay-py], right:[ax+px,ay+py] };
  }

  const tailPts = (!noTail && !isThought) ? getLocalTail(tail) : null;

  c.save();
  if (rotation) {
    c.translate(cx,cy); c.rotate(rotation*Math.PI/180); c.translate(-cx,-cy);
  }
  c.lineJoin='round'; c.lineCap='round';

  const skipBubble = !!opts.skipBubble;

  if (!skipBubble) {
  c.save();
  c.shadowColor='rgba(0,0,0,0.18)'; c.shadowBlur=16; c.shadowOffsetX=2; c.shadowOffsetY=4;
  if (isThought && !noTail) drawThoughtTailCircles(c,bx,by,bw,bh,tail,bgColor,textColor,borderWidth);
  if (tailPts) { drawTailFill(c,tailPts); applyFill(c); c.fill(); }
  buildShapePath(c,shape,cx,cy,rx,ry,bx,by,bw,bh);
  applyFill(c); c.fill();
  c.restore();

  // Fill
  if (isThought && !noTail) drawThoughtTailCircles(c,bx,by,bw,bh,tail,bgColor,textColor,borderWidth);
  if (tailPts) { drawTailFill(c,tailPts); applyFill(c); c.fill(); }
  buildShapePath(c,shape,cx,cy,rx,ry,bx,by,bw,bh); applyFill(c); c.fill();

  // Border
  if (borderWidth>0) {
    c.strokeStyle=textColor; c.lineWidth=borderWidth;
    if (tailPts) {
      drawTailFill(c,tailPts); c.stroke();
      buildShapePath(c,shape,cx,cy,rx,ry,bx,by,bw,bh); applyFill(c); c.fill();
    }
    buildShapePath(c,shape,cx,cy,rx,ry,bx,by,bw,bh);
    if (shape==='whisper') { c.setLineDash([Math.max(8,borderWidth*3),Math.max(5,borderWidth*2)]); }
    c.stroke(); c.setLineDash([]);

    // Caption top stripe
    if (shape==='caption') {
      c.beginPath(); c.moveTo(bx,by+bh*0.28); c.lineTo(bx+bw,by+bh*0.28);
      c.lineWidth=borderWidth*0.7; c.stroke();
    }

    if (isThought && !noTail) drawThoughtTailCircles(c,bx,by,bw,bh,tail,bgColor,textColor,borderWidth);
  } // end borderWidth>0
  } // end !skipBubble

  // ── Text ──
  const textAreaW = bw * (shape==='caption' ? 0.88 : 0.72) * (opts.bubblePadding || 1.0);
  const textAreaCY = shape==='caption' ? cy+bh*0.14 : cy;
  const tCX = cx + (opts.textOffsetX || 0);
  const tCY = textAreaCY + (opts.textOffsetY || 0);
  const lSpacing = opts.letterSpacing || 0;
  const lHeight = opts.lineHeight || 1.30;

  const tStyle   = opts.textStyle  || 'normal';
  const sfxFill  = opts.sfxFill    || '#f5c842';
  const tStroke  = opts.textStroke || 6;
  const tRot     = (opts.textRotation || 0) * Math.PI / 180;
  const hasShadow = opts.textShadow || false;

  c.font = `${fontSize}px '${font}'`;

  // letter-spacing polyfill via custom measureText
  function measureSpaced(txt) {
    let w = 0;
    for (const ch of txt) w += c.measureText(ch).width;
    w += lSpacing * Math.max(0, txt.length - 1);
    return w;
  }
  function drawSpaced(txt, x, y) {
    if (lSpacing === 0) { c.fillText(txt, x, y); return; }
    let cur = x - measureSpaced(txt)/2;
    for (const ch of txt) {
      const cw = c.measureText(ch).width;
      c.fillText(ch, cur + cw/2, y);
      cur += cw + lSpacing;
    }
  }
  function strokeSpaced(txt, x, y) {
    if (lSpacing === 0) { c.strokeText(txt, x, y); return; }
    let cur = x - measureSpaced(txt)/2;
    for (const ch of txt) {
      const cw = c.measureText(ch).width;
      c.strokeText(ch, cur + cw/2, y);
      cur += cw + lSpacing;
    }
  }

  const lines = wrapText(c, text, textAreaW, fontSize, font, lSpacing);
  const lineH = fontSize * lHeight;
  const startY = tCY - (lines.length-1)*lineH/2;

  c.save();
  if (tRot) { c.translate(tCX, tCY); c.rotate(tRot); c.translate(-tCX, -tCY); }
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.font = `${fontSize}px '${font}'`;

  if (hasShadow) {
    c.shadowColor = 'rgba(0,0,0,0.35)';
    c.shadowBlur  = 6;
    c.shadowOffsetX = 2;
    c.shadowOffsetY = 2;
  }

  if (tStyle === 'outlined') {
    c.lineJoin='round'; c.lineCap='round';
    lines.forEach((line,i) => {
      const ty2 = startY+i*lineH;
      c.strokeStyle=textColor; c.lineWidth=tStroke*2;
      strokeSpaced(line, tCX, ty2);
      c.fillStyle=sfxFill;
      drawSpaced(line, tCX, ty2);
    });
  } else if (tStyle === 'floating') {
    c.fillStyle=sfxFill;
    lines.forEach((line,i) => drawSpaced(line, tCX, startY+i*lineH));
  } else {
    c.fillStyle=textColor;
    lines.forEach((line,i) => drawSpaced(line, tCX, startY+i*lineH));
  }
  c.restore();

  c.restore(); // outer save from top of drawBubble
}

/* ── Main draw ──────────────────────────────────────── */
function resetAll() {
  // Reset state to defaults
  Object.assign(state, {
    mode:'single', text:'NANI?!',
    textLeft:"JUJUTSU HIGH AIN'T THAT EASY", textRight:'WITHOUT ANY GOALS.',
    font:'MangaTemple', fontSize:34,
    shape:'oval', tail:'none', rotation:0,
    textStyle:'normal', sfxFill:'#f5c842', textStroke:6,
    textRotation:0, letterSpacing:0, lineHeight:1.30,
    textOffsetX:0, textOffsetY:0, bubblePadding:1.0, bgAlpha:1.0, textShadow:false,
    dlayout:'side-by-side', dtail:'none',
    textColor:'#111111', bgColor:'#faf6ee', borderWidth:4,
    w:520, h:400,
  });

  // Reset text inputs
  document.getElementById('txtInput').value = state.text;
  document.getElementById('txtLeft').value  = state.textLeft;
  document.getElementById('txtRight').value = state.textRight;
  document.getElementById('fontSelect').value = state.font;
  document.getElementById('textShadowToggle').checked = false;

  // Reset sliders
  const sliderMap = {
    fontSize:34, borderWidth:4, canvasW:520, canvasH:400,
    rotation:0, textStroke:6, textRotation:0, letterSpacing:0,
    lineHeight:1.30, textOffsetX:0, textOffsetY:0, bubblePadding:1.00, bgAlpha:1.00,
  };
  Object.entries(sliderMap).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.value = val;
    const key = id==='canvasW'?'w': id==='canvasH'?'h': id;
    syncSlider(el, key);
  });

  // Reset shape buttons
  document.querySelectorAll('#shapeGrid .shape-btn').forEach(b => b.classList.toggle('active', b.dataset.shape==='oval'));
  document.querySelectorAll('#tailGrid .tail-btn').forEach(b => b.classList.toggle('active', b.dataset.tail==='none'));
  document.querySelectorAll('#styleGrid .style-btn').forEach(b => b.classList.toggle('active', b.dataset.style==='normal'));
  document.querySelectorAll('#dLayoutGrid .shape-btn').forEach(b => b.classList.toggle('active', b.dataset.dlayout==='side-by-side'));
  document.querySelectorAll('#dtailGrid .tail-btn').forEach(b => b.classList.toggle('active', b.dataset.dtail==='none'));

  // Hide conditional fields
  document.getElementById('outlineColorField').style.display = 'none';
  document.getElementById('outlineThickField').style.display = 'none';

  // Reset color swatches
  ['textColors','bgColors','sfxFillColors'].forEach(id => {
    const cont = document.getElementById(id);
    if (!cont) return;
    cont.querySelectorAll('.color-swatch').forEach((sw,i) => sw.classList.toggle('active', i===0));
  });
  document.getElementById('textColorPicker').value  = '#111111';
  document.getElementById('bgColorPicker').value    = '#faf6ee';
  document.getElementById('sfxFillPicker').value    = '#f5c842';

  // Reset mode tab to single
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  document.querySelectorAll('.tab-content').forEach((t,i) => t.classList.toggle('active', i===0));

  draw();
}


function draw() {
  const W=state.w, H=state.h;
  canvas.width=W; canvas.height=H;
  ctx.clearRect(0,0,W,H);

  if (state.mode==='single') {
    drawSingle(ctx, W, H);
  } else {
    drawDouble(ctx, W, H);
  }
}

function getPad(W,H) { return Math.min(W,H)*0.1+8; }

function drawSingle(c, W, H) {
  const pad=getPad(W,H);
  drawBubble(c, {
    bx:pad, by:pad, bw:W-pad*2, bh:H-pad*2,
    shape:state.shape, tail:state.tail, text:state.text,
    font:state.font, fontSize:state.fontSize,
    textColor:state.textColor, bgColor:state.bgColor,
    borderWidth:state.textStyle==='floating'?0:state.borderWidth,
    rotation:state.rotation,
    textStyle:state.textStyle, sfxFill:state.sfxFill, textStroke:state.textStroke,
    skipBubble: state.textStyle==='floating',
    textRotation:state.textRotation, letterSpacing:state.letterSpacing,
    lineHeight:state.lineHeight, textOffsetX:state.textOffsetX, textOffsetY:state.textOffsetY,
    bubblePadding:state.bubblePadding, bgAlpha:state.bgAlpha, textShadow:state.textShadow,
  });
}

function drawDouble(c, W, H) {
  const pad=getPad(W,H);
  const gap=12, bw=W-pad*2, bh=H-pad*2;

  if (state.dlayout==='side-by-side') {
    const hw=(bw-gap)/2;
    const leftBubble = {
      bx:pad, by:pad, bw:hw, bh:bh,
      shape:'oval', tail:'none', text:state.textLeft,
      font:state.font, fontSize:state.fontSize,
      textColor:state.textColor, bgColor:state.bgColor,
      borderWidth:state.borderWidth, rotation:0,
    };
    const rightBubble = {
      bx:pad+hw+gap, by:pad, bw:hw, bh:bh,
      shape:'oval', tail:'none', text:state.textRight,
      font:state.font, fontSize:state.fontSize,
      textColor:state.textColor, bgColor:state.bgColor,
      borderWidth:state.borderWidth, rotation:0,
    };
    // Tail on bottom-center of combined area
    if (state.dtail!=='none') {
      drawSharedTail(c, pad, pad, bw, bh, state.dtail);
    }
    drawBubble(c, leftBubble);
    drawBubble(c, rightBubble);

  } else if (state.dlayout==='stacked') {
    const hh=(bh-gap)/2;
    if (state.dtail!=='none') drawSharedTail(c,pad,pad,bw,bh,state.dtail);
    drawBubble(c, {bx:pad,by:pad,bw:bw,bh:hh, shape:'oval',tail:'none',text:state.textLeft, font:state.font,fontSize:state.fontSize,textColor:state.textColor,bgColor:state.bgColor,borderWidth:state.borderWidth,rotation:0});
    drawBubble(c, {bx:pad,by:pad+hh+gap,bw:bw,bh:hh, shape:'oval',tail:'none',text:state.textRight, font:state.font,fontSize:state.fontSize,textColor:state.textColor,bgColor:state.bgColor,borderWidth:state.borderWidth,rotation:0});

  } else { // overlap
    const ow = bw * 0.60;
    const overlapAmt = bw * 0.22;
    const lCx = pad + ow/2;
    const rCx = pad + ow - overlapAmt + ow/2;
    const mCy = pad + bh/2;
    const lRx = ow/2, lRy = bh/2;
    const rRx = ow/2, rRy = bh/2;
    const fs  = state.fontSize * 0.9;
    const bw2 = state.borderWidth;
    const bg  = state.bgColor, fg = state.textColor;

    // Use plain ellipse — guaranteed identical path every call
    function ellipsePath(ctx2, cx2, cy2, rx2, ry2) {
      ctx2.beginPath();
      ctx2.ellipse(cx2, cy2, rx2, ry2, 0, 0, Math.PI * 2);
      ctx2.closePath();
    }

    // ── Shadow pass ──
    c.save();
    c.shadowColor='rgba(0,0,0,0.22)'; c.shadowBlur=20; c.shadowOffsetX=3; c.shadowOffsetY=6;
    ellipsePath(c, lCx, mCy, lRx, lRy); c.fillStyle=bg; c.fill();
    ellipsePath(c, rCx, mCy, rRx, rRy); c.fillStyle=bg; c.fill();
    c.restore();

    // ── STEP 1: left fill ──
    ellipsePath(c, lCx, mCy, lRx, lRy);
    c.fillStyle = bg; c.fill();

    // ── STEP 2: left border ──
    if (bw2 > 0) {
      ellipsePath(c, lCx, mCy, lRx, lRy);
      c.strokeStyle = fg; c.lineWidth = bw2; c.lineJoin='round'; c.stroke();
    }

    // ── STEP 3: clip to right ellipse and flood-fill — this guarantees
    //            the intersection zone is painted with bg color no matter
    //            what the left border drew there ──
    c.save();
    c.beginPath();
    c.ellipse(rCx, mCy, rRx, rRy, 0, 0, Math.PI * 2);
    c.clip();
    c.fillStyle = bg;
    c.fillRect(0, 0, W, H);
    c.restore();

    // ── STEP 4: right border ──
    if (bw2 > 0) {
      ellipsePath(c, rCx, mCy, rRx, rRy);
      c.strokeStyle = fg; c.lineWidth = bw2; c.lineJoin='round'; c.stroke();
    }

    // ── STEP 5: tail ──
    if (state.dtail !== 'none') drawSharedTail(c, pad, pad, bw, bh, state.dtail);

    // ── STEP 6: left text — hard-clipped to left ellipse so it never bleeds right ──
    c.save();
    ellipsePath(c, lCx, mCy, lRx, lRy); c.clip();
    c.font = `${fs}px '${state.font}'`;
    c.fillStyle = fg; c.textAlign = 'center'; c.textBaseline = 'middle';
    const lTextCx = lCx - overlapAmt * 0.28;
    const lTextW  = (ow - overlapAmt) * 0.72;
    const lLines  = wrapText(c, state.textLeft, lTextW, fs, state.font);
    const lLineH  = fs * 1.3;
    const lStartY = mCy - (lLines.length - 1) * lLineH / 2;
    lLines.forEach((line, i) => c.fillText(line, lTextCx, lStartY + i * lLineH));
    c.restore();

    // ── STEP 7: right text — clipped to right ellipse ──
    c.save();
    ellipsePath(c, rCx, mCy, rRx, rRy); c.clip();
    c.font = `${fs}px '${state.font}'`;
    c.fillStyle = fg; c.textAlign = 'center'; c.textBaseline = 'middle';
    const rTextW  = ow * 0.68;
    const rLines  = wrapText(c, state.textRight, rTextW, fs, state.font);
    const rLineH  = fs * 1.3;
    const rStartY = mCy - (rLines.length - 1) * rLineH / 2;
    rLines.forEach((line, i) => c.fillText(line, rCx, rStartY + i * rLineH));
    c.restore();
  }
}

function drawSharedTail(c, bx,by,bw,bh, dir) {
  const cx=bx+bw/2, cy=by+bh/2;
  const reach=Math.min(bw,bh)*0.48;
  const hb=Math.min(bw,bh)*0.075;
  let ax,ay,tx,ty;
  switch(dir) {
    case 'bl': ax=cx-bw*0.18; ay=by+bh; tx=ax-reach*0.45; ty=ay+reach*0.65; break;
    case 'bc': ax=cx; ay=by+bh; tx=cx; ty=ay+reach; break;
    case 'br': ax=cx+bw*0.18; ay=by+bh; tx=ax+reach*0.45; ty=ay+reach*0.65; break;
    case 'tl': ax=cx-bw*0.18; ay=by; tx=ax-reach*0.45; ty=ay-reach*0.65; break;
    case 'tr': ax=cx+bw*0.18; ay=by; tx=ax+reach*0.45; ty=ay-reach*0.65; break;
    default: return;
  }
  const dx2=tx-ax,dy2=ty-ay,len=Math.sqrt(dx2*dx2+dy2*dy2)||1;
  const px=-dy2/len*hb, py=dx2/len*hb;
  const pts={tip:[tx,ty],left:[ax-px,ay-py],right:[ax+px,ay+py]};
  c.save();
  c.lineJoin='round'; c.lineCap='round';
  drawTailFill(c, pts);
  c.fillStyle=state.bgColor; c.fill();
  if (state.borderWidth>0) {
    c.strokeStyle=state.textColor; c.lineWidth=state.borderWidth;
    drawTailFill(c,pts); c.stroke();
  }
  c.restore();
}

/* ── Download ───────────────────────────────────────── */
async function downloadBubble() {
  const btn=document.getElementById('dlBtn'), lbl=document.getElementById('dlLabel');
  btn.classList.add('loading'); lbl.textContent='RENDERING...';
  await document.fonts.ready;
  await new Promise(r=>setTimeout(r,100));

  const off=document.createElement('canvas');
  off.width=state.w; off.height=state.h;
  const oc=off.getContext('2d');

  if (state.mode==='single') drawSingle(oc, state.w, state.h);
  else drawDouble(oc, state.w, state.h);

  off.toBlob(blob => {
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='manga-bubble.png';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    btn.classList.remove('loading'); lbl.textContent='DOWNLOAD PNG';
  }, 'image/png');
}

draw();
</script>
